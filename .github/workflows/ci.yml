name: Halflife CI

on:
  push:
    branches: [main]

jobs:
  selfcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check dependency health
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          include-dev: true
          fail-threshold: 30
          warn-threshold: 60
          download-floor: 500000
