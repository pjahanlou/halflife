name: 'Halflife: Dependency Decay'
description: 'Catches unmaintained open source dependencies before they become a liability.'
author: 'pjahanlou'

inputs:
  github-token:
    description: 'GitHub token used to call the GitHub REST API'
    required: false
    default: ${{ github.token }}
  manifest-file:
    description: 'Path to the package.json file to analyze'
    required: false
    default: 'package.json'
  include-dev:
    description: 'Include devDependencies in addition to dependencies'
    required: false
    default: 'false'
  fail-threshold:
    description: 'Score below this value causes the action to exit with code 1'
    required: false
    default: '30'
  warn-threshold:
    description: 'Score below this value (but above fail-threshold) triggers a warning'
    required: false
    default: '60'
  download-floor:
    description: 'Monthly download count at or above which a package is skipped as established'
    required: false
    default: '500000'
  ignore-packages:
    description: 'Comma-separated list of package names to skip'
    required: false
    default: ''
  comment-on-pr:
    description: 'Post results as a PR comment (requires pull-requests: write permission)'
    required: false
    default: 'false'
  output-format:
    description: 'Output format: markdown (default), json, or both'
    required: false
    default: 'markdown'
  recency-weight:
    description: 'Maximum points for commit recency component'
    required: false
    default: '50'
  pressure-weight:
    description: 'Maximum points for issue pressure component'
    required: false
    default: '30'
  base-weight:
    description: 'Maximum points for base health component'
    required: false
    default: '20'

runs:
  using: 'node20'
  main: 'dist/index.js'

branding:
  icon: 'activity'
  color: 'yellow'
